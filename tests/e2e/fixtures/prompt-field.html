<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>PromptDeck E2E Fixture</title>
    <style>
      body {
        margin: 24px;
        color: #111827;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      label {
        display: block;
        margin: 0 0 18px;
        font-size: 13px;
        font-weight: 650;
      }

      textarea,
      [contenteditable="true"],
      closed-shadow-editor,
      iframe {
        display: block;
        width: min(720px, calc(100vw - 48px));
        min-height: 132px;
        margin-top: 6px;
        border: 1px solid #9ca3af;
        border-radius: 6px;
        padding: 10px;
        font: 14px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <label>
      Textarea
      <textarea id="prompt-input"></textarea>
    </label>

    <label>
      Contenteditable
      <div id="rich-editor" contenteditable="true" role="textbox" aria-label="Contenteditable prompt target"></div>
    </label>

    <label>
      Multi-paragraph contenteditable
      <div id="multiblock-editor" contenteditable="true" role="textbox" aria-label="Multi-paragraph prompt target"><p>Paragraph one of existing notes.</p><p>Paragraph two continues.</p><p>Paragraph three keeps going.</p><p>Paragraph four adds more.</p><p>Paragraph five is here too.</p><p>Paragraph six follows along.</p><p>Paragraph seven nearly done.</p><p>Paragraph eight wraps up.</p></div>
    </label>

    <label>
      New-block contenteditable
      <div id="newblock-editor" contenteditable="true" role="textbox" aria-label="New-block prompt target"><p>Please write the following</p></div>
    </label>

    <label>
      Shadow DOM textarea
      <div id="shadow-editor"></div>
    </label>

    <label>
      Closed shadow DOM textarea
      <closed-shadow-editor id="closed-shadow-editor" tabindex="0"></closed-shadow-editor>
    </label>

    <label>
      Embedded editor
      <iframe id="frame-editor" srcdoc="<!doctype html><html><body><textarea id='frame-input' aria-label='Embedded prompt target'></textarea></body></html>"></iframe>
    </label>

    <label>
      Fallback textarea
      <textarea id="fallback-input"></textarea>
    </label>

    <script>
      const shadowEditor = document.getElementById("shadow-editor");
      const shadowRoot = shadowEditor.attachShadow({ mode: "open" });
      const shadowTextarea = document.createElement("textarea");
      shadowTextarea.setAttribute("aria-label", "Shadow DOM prompt target");
      shadowRoot.append(shadowTextarea);

      class ClosedShadowEditor extends HTMLElement {
        #textarea;

        constructor() {
          super();
          const root = this.attachShadow({ mode: "closed", delegatesFocus: true });
          this.#textarea = document.createElement("textarea");
          this.#textarea.setAttribute("aria-label", "Closed shadow DOM prompt target");
          root.append(this.#textarea);
          this.addEventListener("click", () => this.#textarea.focus());
        }

        get value() {
          return this.#textarea.value;
        }
      }

      customElements.define("closed-shadow-editor", ClosedShadowEditor);

      const fallback = document.getElementById("fallback-input");

      fallback.addEventListener("input", (event) => {
        if (fallback.dataset.rejectDirect !== "true") return;
        if (event.inputType !== "insertText") return;
        if (fallback.value.startsWith(";;")) return;

        fallback.value = fallback.dataset.command || ";;blog";
        fallback.setSelectionRange(fallback.value.length, fallback.value.length);
      });
    </script>
  </body>
</html>
