name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Typecheck, lint, unit, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Build CLI
        run: npm run build:cli

      - name: Install VS Code extension deps
        run: npm ci
        working-directory: extensions/vscode

      - name: Typecheck VS Code extension
        run: npm run typecheck
        working-directory: extensions/vscode

      - name: Build VS Code extension
        run: npm run build
        working-directory: extensions/vscode

      - name: Package and validate Chrome extension
        run: npm run package:chrome:dist

      - name: Upload built extension
        uses: actions/upload-artifact@v4
        with:
          name: promptdeck-dist
          path: dist

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download built extension
        uses: actions/download-artifact@v4
        with:
          name: promptdeck-dist
          path: dist

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run test:e2e
